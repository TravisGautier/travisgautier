<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Travis Gautier</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <style>
    @font-face {
      font-family: 'Cormorant Garamond';
      font-weight: 300;
      font-display: swap;
      src: url('/fonts/CormorantGaramond-Light.woff2') format('woff2');
    }

    @font-face {
      font-family: 'Outfit';
      font-weight: 300;
      font-display: swap;
      src: url('/fonts/Outfit-Light.woff2') format('woff2');
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #c8dcea;
      color: #3a3a3a;
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .clouds {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .clouds::before,
    .clouds::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.35);
      filter: blur(40px);
    }

    .clouds::before {
      width: 500px;
      height: 200px;
      top: 15%;
      left: -10%;
      animation: drift 25s ease-in-out infinite alternate;
    }

    .clouds::after {
      width: 400px;
      height: 160px;
      bottom: 20%;
      right: -5%;
      animation: drift 20s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift {
      from { transform: translateX(0); }
      to { transform: translateX(80px); }
    }

    main {
      text-align: center;
      position: relative;
      z-index: 1;
      padding: 2rem;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 4rem;
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
      color: #2a2a2a;
    }

    .subtitle {
      font-size: 1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 2.5rem;
    }

    .cta {
      display: inline-block;
      padding: 0.8rem 2.5rem;
      font-family: 'Outfit', sans-serif;
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-decoration: none;
      color: #3a3a3a;
      border: 1px solid rgba(0, 0, 0, 0.2);
      transition: border-color 0.3s ease, color 0.3s ease;
    }

    .cta:hover,
    .cta:focus-visible {
      border-color: #b8942e;
      color: #b8942e;
    }

    .cta:focus-visible {
      outline: 2px solid #b8942e;
      outline-offset: 4px;
    }

    @media (max-width: 768px) {
      h1 { font-size: 3rem; }
      .subtitle { font-size: 0.85rem; }
    }

    @media (max-width: 480px) {
      h1 { font-size: 2.2rem; }
      main { padding: 1.5rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .clouds::before,
      .clouds::after {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="clouds"></div>
  <main>
    <h1>Lost in the Clouds</h1>
    <p class="subtitle">This page could not be found</p>
    <a href="/" class="cta">Return to Olympus</a>
  </main>
</body>
</html>
