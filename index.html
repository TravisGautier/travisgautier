<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Travis Gautier</title>
<link rel="stylesheet" href="/styles/main.css">
</head>
<body>

<a class="skip-link" href="#canvas-container">Skip to content</a>

<div class="cursor" id="cursor" aria-hidden="true"></div>
<div class="cursor-trail" id="cursorTrail" aria-hidden="true"></div>

<div id="loading" aria-hidden="true" style="position:fixed;inset:0;z-index:1000;background:#c8dcea;display:flex;align-items:center;justify-content:center;pointer-events:none;transition:opacity 0.8s ease">
  Travis Gautier
</div>

<div id="canvas-container" role="img" aria-label="Interactive 3D scene: a portal sitting inside an open-air Greek temple atop a mountain, surrounded by marble pillars and clouds below. Hold click to rotate between two ventures."></div>

<div class="overlay">
  <div class="header">
    <div class="logo" id="logo">Travis Gautier</div>
    <div class="header-right">
      <a href="mailto:travis@travisgautier.com" class="header-link" data-hover>Contact</a>
    </div>
  </div>

  <div class="side-label left" id="labelLeft">
    <span class="label-num" aria-hidden="true">01</span>
    <span class="label-title">Venture Alpha</span>
    <span class="label-desc">Innovation & Technology</span>
  </div>

  <div class="side-label right" id="labelRight">
    <span class="label-num" aria-hidden="true">02</span>
    <span class="label-title">Venture Omega</span>
    <span class="label-desc">Creative & Strategy</span>
  </div>

  <div class="bottom-bar">
    <div class="scroll-hint" id="scrollHint">
      <div class="scroll-line" id="scrollLine"></div>
      Scroll to explore
    </div>
    <div class="hold-hint" id="holdHint">
      <span class="hold-hint-text">Hold click or Space to reveal</span>
      <div class="hold-indicator">
        <div class="hold-indicator-fill" id="holdFill"></div>
      </div>
    </div>
  </div>
</div>

<div id="venture-announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>

<div class="transition-screen" id="transitionA">
  <div class="transition-bg gold" aria-hidden="true"></div>
  <div class="inner"><h2>Venture Alpha</h2><p>Entering experience&hellip;</p></div>
</div>
<div class="transition-screen" id="transitionB">
  <div class="transition-bg purple" aria-hidden="true"></div>
  <div class="inner"><h2>Venture Omega</h2><p>Entering experience&hellip;</p></div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
